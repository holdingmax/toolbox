databases:
  - name: toolbox-db
    plan: free
    databaseName: toolbox
    user: toolbox

services:
  - type: web
    name: toolbox
    env: node
    region: oregon
    plan: free
    buildCommand: >-
      cd apps/frontend && npm install && npm run build &&
      cd ../backend && npm install &&
      npx prisma generate &&
      npx prisma db push &&
      npm run build
    startCommand: node apps/backend/dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: toolbox-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        # Ajustar si Render asigna un nombre diferente a "toolbox"
        value: https://toolbox.onrender.com
